<!DOCTYPE html>
<html>
<head>
    <title>Properties - DreamHome</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <div class="nav-logo">🏠 DreamHome</div>
    <button class="hamburger" onclick="toggleMenu()">☰</button>
    <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="properties.html">Properties</a>
        <a href="add-property.html">List Property</a>
        <a href="favourites.html">Favourites</a>
        <a href="profile.html">Profile</a>
        <a href="admin.html">Admin</a>
        <a href="login.html">Logout</a>
    </div>
</nav>

<div class="container">
    <h2 class="section-title">All Properties</h2>

    <!-- Filters -->
    <div class="filters-container">
        <input type="text" id="searchInput" placeholder="Search by location, type...">
        <select id="listingFilter">
            <option value="">Buy or Rent?</option>
            <option value="Sale">For Sale</option>
            <option value="Rent">For Rent</option>
        </select>
        <select id="typeFilter">
            <option value="">Property Type</option>
            <option value="Apartment">Apartment</option>
            <option value="House">House</option>
            <option value="Villa">Villa</option>
            <option value="Studio">Studio</option>
            <option value="Cottage">Cottage</option>
            <option value="Commercial">Commercial</option>
        </select>
        <button class="btn-primary" onclick="filterProperties()">🔍 Search</button>
    </div>

    <p class="results-count" id="propertiesCount"></p>
    <div id="propertiesList" class="properties-grid"></div>
</div>

<script src="main.js"></script>
<script>
    loadAllProperties();
</script>
</body>
</html>
