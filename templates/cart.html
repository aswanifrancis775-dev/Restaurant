<!DOCTYPE html>
<html>
<head>
    <title>Cart - Restaurant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav>
    <div class="nav-logo">🍽️ DeliciousEats</div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/menu">Menu</a>
        <a href="/cart">Cart 🛒 <span id="cartCount">0</span></a>
        <a href="/orders">My Orders</a>
        <a href="/booking">Book Table</a>
        <a href="/logout">Logout</a>
    </div>
</nav>

<div class="container">
    <h2 class="section-title">Your Cart</h2>

    <div class="cart-container">
        <div id="cartItems"></div>

        <div class="cart-summary" id="cartSummary" style="display:none">
            <h3>Order Summary</h3>
            <div class="summary-row">
                <span>Subtotal:</span>
                <span id="subtotal">$0.00</span>
            </div>
            <div class="summary-row">
                <span>Tax (10%):</span>
                <span id="tax">$0.00</span>
            </div>
            <div class="summary-row total">
                <span>Total:</span>
                <span id="total">$0.00</span>
            </div>

            <h3>Payment Method</h3>
            <div class="payment-options">
                <label>
                    <input type="radio" name="payment" value="cash" checked>
                    💵 Cash on Delivery
                </label>
                <label>
                    <input type="radio" name="payment" value="card">
                    💳 Card Payment
                </label>
                <label>
                    <input type="radio" name="payment" value="mobile">
                    📱 Mobile Money
                </label>
            </div>

            <button class="btn-primary" onclick="placeOrder()">
                Place Order 🚀
            </button>
            <button class="btn-secondary" onclick="clearCart()">
                Clear Cart
            </button>
            <p id="orderMessage"></p>
        </div>

        <div id="emptyCart" style="display:none" class="empty-cart">
            <div style="font-size:4rem">🛒</div>
            <h3>Your cart is empty!</h3>
            <p>Add some delicious items from our menu</p>
            <a href="/menu"><button class="btn-primary">Browse Menu</button></a>
        </div>
    </div>
</div>

<script src="/static/main.js"></script>
<script>
    loadCart();
    updateCartCount();
</script>
</body>
</html>
