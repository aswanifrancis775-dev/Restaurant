<!DOCTYPE html>
<html>
<head>
    <title>Menu - Restaurant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav>
    <div class="nav-logo">🍽️ DeliciousEats</div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/menu">Menu</a>
        <a href="/cart">Cart 🛒 <span id="cartCount">0</span></a>
        <a href="/orders">My Orders</a>
        <a href="/booking">Book Table</a>
        <a href="/logout">Logout</a>
    </div>
</nav>

<div class="container">
    <h2 class="section-title">Our Menu</h2>

    <!-- Category Filters -->
    <div class="category-filters">
        <button class="filter-btn active" onclick="filterMenu('')">All</button>
        <button class="filter-btn" onclick="filterMenu('Main Course')">Main Course</button>
        <button class="filter-btn" onclick="filterMenu('Soups')">Soups</button>
        <button class="filter-btn" onclick="filterMenu('Sides')">Sides</button>
        <button class="filter-btn" onclick="filterMenu('Drinks')">Drinks</button>
        <button class="filter-btn" onclick="filterMenu('Desserts')">Desserts</button>
    </div>

    <div id="menuItems" class="menu-grid"></div>
</div>

<!-- Cart Notification -->
<div id="cartNotification" class="cart-notification" style="display:none">
    Item added to cart! <a href="/cart">View Cart</a>
</div>

<script src="/static/main.js"></script>
<script>
    loadMenu('');
    updateCartCount();

    function filterMenu(category) {
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        event.target.classList.add('active');
        loadMenu(category);
    }
</script>
</body>
</html>
