<!DOCTYPE html>
<html>
<head>
    <title>Add Property - DreamHome</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <div class="nav-logo">🏠 DreamHome</div>
    <div class="nav-links">
        <a href="index.html">Home</a> 
        <a href="add-property.html">List Property</a>
        <a href="favourites.html">❤️ Favourites</a>
        <a href="profile.html">Profile</a>
        <a href="logout.html">Logout</a>
    </div>
</nav>

<div class="container">
    <h2 class="section-title">List Your Property</h2>

    <div class="form-container">
        <div class="form-grid">
            <div class="form-group">
                <label>Property Title</label>
                <input type="text" id="title" 
                    placeholder="e.g. Modern 2 Bedroom Apartment">
            </div>
            <div class="form-group">
                <label>Location</label>
                <input type="text" id="location" 
                    placeholder="e.g. Nairobi, Kenya">
            </div>
            <div class="form-group">
                <label>Property Type</label>
                <select id="property_type">
                    <option value="">Select Type</option>
                    <option value="Apartment">Apartment</option>
                    <option value="House">House</option>
                    <option value="Villa">Villa</option>
                    <option value="Studio">Studio</option>
                    <option value="Cottage">Cottage</option>
                    <option value="Commercial">Commercial</option>
                </select>
            </div>
            <div class="form-group">
                <label>Listing Type</label>
                <select id="listing_type">
                    <option value="">For Sale or Rent?</option>
                    <option value="Sale">For Sale</option>
                    <option value="Rent">For Rent</option>
                </select>
            </div>
            <div class="form-group">
                <label>Price ($)</label>
                <input type="number" id="price" 
                    placeholder="e.g. 250000">
            </div>
            <div class="form-group">
                <label>Area (sq ft)</label>
                <input type="number" id="area" 
                    placeholder="e.g. 120">
            </div>
            <div class="form-group">
                <label>Bedrooms</label>
                <select id="bedrooms">
                    <option value="0">0 (Studio/Commercial)</option>
                    <option value="1">1 Bedroom</option>
                    <option value="2">2 Bedrooms</option>
                    <option value="3">3 Bedrooms</option>
                    <option value="4">4 Bedrooms</option>
                    <option value="5">5+ Bedrooms</option>
                </select>
            </div>
            <div class="form-group">
                <label>Bathrooms</label>
                <select id="bathrooms">
                    <option value="1">1 Bathroom</option>
                    <option value="2">2 Bathrooms</option>
                    <option value="3">3 Bathrooms</option>
                    <option value="4">4+ Bathrooms</option>
                </select>
            </div>
        </div>

        <div class="form-group full-width">
            <label>Description</label>
            <textarea id="description" rows="5"
                placeholder="Describe your property in detail..."></textarea>
        </div>

        <button class="btn-primary" onclick="addProperty()">
            🏠 List Property
        </button>
        <p id="message"></p>
    </div>
</div>

<script src="/static/main.js"></script>
<script>
async function addProperty() {
    const title = document.getElementById('title').value;
    const location = document.getElementById('location').value;
    const property_type = document.getElementById('property_type').value;
    const listing_type = document.getElementById('listing_type').value;
    const price = document.getElementById('price').value;
    const area = document.getElementById('area').value;
    const bedrooms = document.getElementById('bedrooms').value;
    const bathrooms = document.getElementById('bathrooms').value;
    const description = document.getElementById('description').value;

    if (!title || !location || !property_type || 
        !listing_type || !price || !area || !description) {
        showMessage('Please fill in all fields!', 'red');
        return;
    }

    const res = await fetch('/add-property', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            title,
            location,
            property_type,
            listing_type,
            price: parseFloat(price),
            area: parseFloat(area),
            bedrooms: parseInt(bedrooms),
            bathrooms: parseInt(bathrooms),
            description
        })
    });

    const data = await res.json();
    showMessage(data.message, res.ok ? 'green' : 'red');

    if (res.ok) {
        setTimeout(() => {
            window.location.href = '/properties';
        }, 1500);
    }
}

function showMessage(msg, color) {
    const el = document.getElementById('message');
    el.textContent = msg;
    el.style.color = color;
}
</script>
</body>
</html>
